name: Build and Deploy to Azure VM

on:
  push:
    branches:
      - develop  # ajusta si despliegas desde otra rama

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'  # usa la versión de Node.js deseada

      - name: Install dependencies
        run: npm install

      - name: Build the project
        run: npm run build

      # Copiar los archivos construidos y el código del servidor a la VM usando SCP
      - name: Copy files to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_PRIVATE_KEY }}
          port: ${{ secrets.VM_PORT }}  # opcional si usas el puerto por defecto 22
          source: "."
          target: "/home/${{ secrets.VM_USERNAME }}/form-app"  # ajusta la ruta de destino según sea necesario

      # Verificar que Node.js está instalado en la VM
      - name: Check Node.js version on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_PRIVATE_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            node -v
            npm -v

      # Instalar Node.js en la VM si no está instalado
      - name: Install Node.js on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_PRIVATE_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
            sudo apt-get install -y nodejs
            node -v
            npm -v

      # Ejecutar comandos remotos vía SSH para instalar dependencias y reiniciar la aplicación
      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_PRIVATE_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            cd ~/form-app
            npm install  # Instalar todas las dependencias
            # Si usas PM2, reiniciar la app o iniciar si no está corriendo
            pm2 restart app || pm2 start server.js --name app
